commit-msg:
  commands:
    lint:
      run: pnpm exec lint-commit-message {1}
pre-commit:
  commands:
    lint:
      glob: '*.ts'
      run: pnpm run lint --fix --format=unix {staged_files}
      stage_fixed: true
    format:
      run: pnpm exec oxfmt --no-error-on-unmatched-pattern {staged_files}
      stage_fixed: true
    test:
      run: pnpm run test --silent --reporter dot
